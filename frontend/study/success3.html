<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>เริ่มเรียนคอร์ส</title>

</head>

<body>

<div class="container">

<h1>คอร์ส T-GAT</h1>

<!-- progress -->
<div class="progress-box">
<p>ความคืบหน้าการเรียน</p>
<div class="progress-bar">
<div id="progress"></div>
</div>
</div>

<!-- video -->
<h2>บทที่ 1 </h2>

<div class="video-box">
<iframe width="560" height="315"
src="https://www.youtube.com/embed/f6NHbn_ocmc"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<button onclick="finishLesson()">เรียนจบบทนี้</button>

<hr>

<!-- quiz -->
<h2>แบบทดสอบ</h2>

<div class="quiz">
<!-- ข้อ1 -->
<p>1. กำหนดให้ ถ้า A > B และ B > C ข้อใด “ถูกต้องเสมอ”</p>

<label><input type="radio" name="q1" value="a"> A = C</label><br>
<label><input type="radio" name="q1" value="b"> A < C</label><br>
<label><input type="radio" name="q1" value="c"> A > C</label><br>
<!-- ข้อ2 -->
<p>2. คน 3 คนทำงานชิ้นหนึ่ง<br>
●A ทำคนเดียวเสร็จใน 6 ชั่วโมง<br>
●B ทำคนเดียวเสร็จใน 3 ชั่วโมง<br>
●C ทำคนเดียวเสร็จใน 2 ชั่วโมง
</p>

<label><input type="radio" name="q2" value="a"> 1 ชั่วโมง</label><br>
<label><input type="radio" name="q2" value="b"> 1.5 ชั่วโมง</label><br>
<label><input type="radio" name="q2" value="c"> 2 ชั่วโมง</label><br>

<br>

<button onclick="checkQuiz()">ส่งคำตอบ</button>

<p id="result"></p>

</div>

</div>

<script src="course3.js"></script>

</body>
